<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hold 视觉设计 V2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a14;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  h1 { font-size: 1.3em; color: #e0e0ff; margin-bottom: 6px; }
  .subtitle { color: #555; margin-bottom: 32px; font-size: 0.8em; }

  .demo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    max-width: 700px;
  }

  .demo-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: #111122;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #222244;
  }
  .demo-card h3 {
    font-size: 0.85em;
    color: #8888ff;
    font-weight: 400;
  }

  canvas {
    background: #0f0f1e;
    border-radius: 6px;
  }

  .controls {
    margin-top: 32px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: #2a2a4a;
    color: #ccc;
    border: 1px solid #3a3a6a;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.8em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: #3a3a5a; color: #fff; }
  .btn.active { background: #5c5cff; color: #fff; border-color: #5c5cff; }

  .desc {
    margin-top: 28px;
    max-width: 560px;
    text-align: center;
    color: #555;
    font-size: 0.75em;
    line-height: 1.7;
  }
</style>
</head>
<body>
<h1>Hold 音符设计 V2</h1>
<p class="subtitle">点击按钮查看各方案</p>

<div class="demo-grid">
  <!-- 方案 B: 边缘发光进度条 -->
  <div class="demo-card">
    <h3>B. 边缘发光条</h3>
    <canvas id="canvasB" width="80" height="260"></canvas>
  </div>

  <!-- 方案 C: 水波填充 -->
  <div class="demo-card">
    <h3>C. 水波扩散</h3>
    <canvas id="canvasC" width="80" height="260"></canvas>
  </div>

  <!-- 方案 D: 霓虹脉冲 -->
  <div class="demo-card">
    <h3>D. 霓虹脉冲</h3>
    <canvas id="canvasD" width="80" height="260"></canvas>
  </div>

  <!-- 方案 E: 扫描线 -->
  <div class="demo-card">
    <h3>E. 扫描线</h3>
    <canvas id="canvasE" width="80" height="260"></canvas>
  </div>
</div>

<div class="controls">
  <button class="btn active" onclick="setGlobalPhase('idle')">待按下</button>
  <button class="btn" onclick="setGlobalPhase('holding')">按住中</button>
  <button class="btn" onclick="setGlobalPhase('complete')">完成消失</button>
</div>

<div class="desc">
  <strong>B 边缘发光条：</strong>实心填充，边缘有发光效果，按住越久边缘越亮。<br>
  <strong>C 水波扩散：</strong>完成时底部发出一道水平波纹向上扩散，同时渐隐。<br>
  <strong>D 霓虹脉冲：</strong>完成时头部爆发粒子，整体快速闪烁后消失。<br>
  <strong>E 扫描线：</strong>有一条扫描线从底部向上移动，完成时扫描线加速上移并淡出。
</div>

<script>
// ─── 通用参数 ───
const W = 80;
const H = 260;
const judgeY = H * 0.78;
const barWidth = 24;
const barX = W / 2;
const radius = 10;
const travelPerMs = H * 0.75 / 2500;
const holdDuration = 1000;
const tailOffset = travelPerMs * holdDuration;
const barTop = judgeY + 20 - tailOffset;
const barBottom = judgeY + 20;
const filledBottom = barBottom;
const fillTop = barTop;
const totalHeight = barBottom - barTop;

// ─── 全局状态 ───
let globalPhase = 'idle';
let progress = 0.65; // 按住进度（视觉展示用）
let completeT = 0;   // 完成动画进度
let lastTime = null;
let particles = [];
let ripples = [];
let scanLineY = barBottom;
let scanSpeed = 0;

function setGlobalPhase(phase) {
  globalPhase = phase;
  completeT = 0;
  particles = [];
  ripples = [];
  scanLineY = barBottom;
  scanSpeed = 0;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  lastTime = null;
}

// ─── 绘制辅助 ───
function drawBarOutline(x, y1, y2, alpha, lineWidth = 1.5) {
  ctxB.strokeStyle = `rgba(100,120,255,${alpha})`;
  ctxB.lineWidth = lineWidth;
  ctxB.beginPath();
  ctxB.moveTo(x - barWidth/2, y1);
  ctxB.lineTo(x - barWidth/2, y2);
  ctxB.moveTo(x + barWidth/2, y1);
  ctxB.lineTo(x + barWidth/2, y2);
  ctxB.stroke();
}

function hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── 方案 B: 边缘发光条 ───
const canvasB = document.getElementById('canvasB');
const ctxB = canvasB.getContext('2d');

function drawB(dt) {
  ctxB.clearRect(0, 0, W, H);
  const p = globalPhase === 'idle' ? 0 : progress;
  const fade = globalPhase === 'complete' ? 1 - easeOut(completeT) : 0;
  const fillH = totalHeight * p;
  const fTop = filledBottom - fillH;

  // 外发光
  const glowAlpha = (0.15 + 0.25 * p) * (1 - fade * 0.7);
  ctxB.shadowColor = `rgba(120,140,255,${glowAlpha * 2})`;
  ctxB.shadowBlur = 12 * p;

  // 实心填充
  const fillAlpha = (0.6 + 0.3 * p) * (1 - fade);
  ctxB.fillStyle = hex2rgba('#7070ff', fillAlpha);
  ctxB.fillRect(barX - barWidth/2, fTop, barWidth, fillH);

  ctxB.shadowBlur = 0;

  // 边缘高光线
  const edgeAlpha = (0.5 + 0.4 * p) * (1 - fade * 0.8);
  ctxB.strokeStyle = `rgba(200,210,255,${edgeAlpha})`;
  ctxB.lineWidth = 1.5;
  ctxB.beginPath();
  ctxB.moveTo(barX - barWidth/2, fTop);
  ctxB.lineTo(barX - barWidth/2, filledBottom);
  ctxB.stroke();

  // 顶部前沿
  if (p > 0) {
    ctxB.fillStyle = `rgba(220,230,255,${(0.7 + 0.3 * p) * (1 - fade)})`;
    ctxB.fillRect(barX - barWidth/2, fTop - 1.5, barWidth, 3);
  }

  // 头部圆圈
  ctxB.strokeStyle = `rgba(120,130,255,${(0.6 + 0.3 * p) * (1 - fade)})`;
  ctxB.lineWidth = 2;
  ctxB.beginPath();
  ctxB.arc(barX, filledBottom, radius, 0, Math.PI * 2);
  ctxB.stroke();
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

// ─── 方案 C: 水波扩散 ───
const canvasC = document.getElementById('canvasC');
const ctxC = canvasC.getContext('2d');

function drawC(dt) {
  ctxC.clearRect(0, 0, W, H);
  const p = globalPhase === 'idle' ? 0 : progress;
  const fade = globalPhase === 'complete' ? easeOut(completeT) : 0;
  const fillH = totalHeight * p;
  const fTop = filledBottom - fillH;

  // 填充区（蓝色玻璃质感）
  const fillAlpha = (0.5 + 0.2 * p) * (1 - fade);
  const grad = ctxC.createLinearGradient(barX - barWidth/2, fTop, barX - barWidth/2, filledBottom);
  grad.addColorStop(0, `rgba(60,140,255,${fillAlpha * 0.4})`);
  grad.addColorStop(1, `rgba(60,140,255,${fillAlpha})`);
  ctxC.fillStyle = grad;
  ctxC.fillRect(barX - barWidth/2, fTop, barWidth, fillH);

  // 轮廓
  const outlineAlpha = (0.3 + 0.2 * p) * (1 - fade * 0.5);
  ctxC.strokeStyle = `rgba(100,180,255,${outlineAlpha})`;
  ctxC.lineWidth = 1.5;
  ctxC.strokeRect(barX - barWidth/2, fillTop, barWidth, totalHeight);

  // 头部
  ctxC.strokeStyle = `rgba(100,200,255,${(0.5 + 0.3 * p) * (1 - fade)})`;
  ctxC.lineWidth = 2;
  ctxC.beginPath();
  ctxC.arc(barX, filledBottom, radius, 0, Math.PI * 2);
  ctxC.stroke();

  // 水波纹
  if (globalPhase === 'complete') {
    const waveProgress = completeT;
    const waveY = filledBottom - waveProgress * (totalHeight * 0.8);
    const waveAlpha = (1 - waveProgress) * 0.8;
    const waveW = barWidth * (0.5 + waveProgress * 0.5);

    ctxC.strokeStyle = `rgba(150,220,255,${waveAlpha})`;
    ctxC.lineWidth = 2;
    ctxC.beginPath();
    ctxC.moveTo(barX - waveW/2, waveY);
    ctxC.lineTo(barX + waveW/2, waveY);
    ctxC.stroke();

    // 第二道波
    if (waveProgress < 0.6) {
      const w2 = barWidth * (0.3 + waveProgress * 0.3);
      ctxC.strokeStyle = `rgba(100,180,255,${waveAlpha * 0.5})`;
      ctxC.lineWidth = 1;
      ctxC.beginPath();
      ctxC.moveTo(barX - w2/2, waveY - 8);
      ctxC.lineTo(barX + w2/2, waveY - 8);
      ctxC.stroke();
    }
  }
}

// ─── 方案 D: 霓虹脉冲 ───
const canvasD = document.getElementById('canvasD');
const ctxD = canvasD.getContext('2d');

function drawD(dt) {
  ctxD.clearRect(0, 0, W, H);
  const p = globalPhase === 'idle' ? 0 : progress;
  const fade = globalPhase === 'complete' ? easeOut(completeT) : 0;
  const fillH = totalHeight * p;
  const fTop = filledBottom - fillH;

  // 脉冲闪烁
  const flicker = globalPhase === 'complete'
    ? 0.5 + 0.5 * Math.sin(completeT * 30)
    : 1;
  const fAlpha = (0.5 + 0.3 * p) * (1 - fade * 0.8) * flicker;

  // 条形主体
  ctxD.shadowColor = `rgba(180,100,255,${fAlpha})`;
  ctxD.shadowBlur = 15 * p;
  ctxD.fillStyle = `rgba(160,80,255,${fAlpha})`;
  ctxD.fillRect(barX - barWidth/2, fTop, barWidth, fillH);
  ctxD.shadowBlur = 0;

  // 边缘
  ctxD.strokeStyle = `rgba(220,180,255,${(0.6 + 0.3 * p) * (1 - fade) * flicker})`;
  ctxD.lineWidth = 1;
  ctxD.strokeRect(barX - barWidth/2, fillTop, barWidth, totalHeight);

  // 头部
  ctxD.shadowColor = `rgba(200,120,255,${fAlpha})`;
  ctxD.shadowBlur = 10;
  ctxD.strokeStyle = `rgba(200,150,255,${(0.7 + 0.2 * p) * (1 - fade) * flicker})`;
  ctxD.lineWidth = 2;
  ctxD.beginPath();
  ctxD.arc(barX, filledBottom, radius, 0, Math.PI * 2);
  ctxD.stroke();
  ctxD.shadowBlur = 0;

  // 粒子
  if (globalPhase === 'complete' && particles.length === 0) {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 * i / 8) + Math.random() * 0.3;
      particles.push({
        x: barX, y: filledBottom,
        vx: Math.cos(angle) * (40 + Math.random() * 30),
        vy: Math.sin(angle) * (40 + Math.random() * 30) - 20,
        size: 2 + Math.random() * 2,
        alpha: 1
      });
    }
  }

  particles.forEach(pt => {
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vy += 80 * dt;
    pt.alpha = Math.max(0, 1 - completeT * 1.5);
    if (pt.alpha > 0) {
      ctxD.fillStyle = `rgba(200,160,255,${pt.alpha})`;
      ctxD.beginPath();
      ctxD.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
      ctxD.fill();
    }
  });
}

// ─── 方案 E: 扫描线 ───
const canvasE = document.getElementById('canvasE');
const ctxE = canvasE.getContext('2d');

function drawE(dt) {
  ctxE.clearRect(0, 0, W, H);
  const p = globalPhase === 'idle' ? 0 : progress;
  const fade = globalPhase === 'complete' ? easeOut(completeT) : 0;
  const fillH = totalHeight * p;
  const fTop = filledBottom - fillH;

  // 扫描线位置
  if (globalPhase === 'complete') {
    scanSpeed += 200 * dt;
    scanLineY -= scanSpeed * dt;
  } else if (globalPhase === 'holding') {
    scanLineY = filledBottom - fillH;
  } else {
    scanLineY = barBottom;
  }

  // 填充区（扫描线下方的区域）
  const fillAlpha = (0.55 + 0.2 * p) * (1 - fade);
  ctxE.fillStyle = `rgba(80,200,180,${fillAlpha})`;
  ctxE.fillRect(barX - barWidth/2, scanLineY, barWidth, filledBottom - scanLineY);

  // 扫描线上的光晕
  const scanAlpha = (globalPhase === 'complete' ? 1 : 0.8) * (1 - fade);
  ctxE.shadowColor = `rgba(120,255,220,${scanAlpha})`;
  ctxE.shadowBlur = 10;
  ctxE.fillStyle = `rgba(150,255,220,${scanAlpha})`;
  ctxE.fillRect(barX - barWidth/2 - 2, scanLineY - 2, barWidth + 4, 4);
  ctxE.shadowBlur = 0;

  // 扫描线以上的轮廓（淡）
  const outlineAlpha = (0.2 + 0.1 * p) * (1 - fade * 0.5);
  ctxE.strokeStyle = `rgba(80,200,180,${outlineAlpha})`;
  ctxE.lineWidth = 1;
  ctxE.beginPath();
  ctxE.moveTo(barX - barWidth/2, fillTop);
  ctxE.lineTo(barX - barWidth/2, scanLineY);
  ctxE.moveTo(barX + barWidth/2, fillTop);
  ctxE.lineTo(barX + barWidth/2, scanLineY);
  ctxE.stroke();

  // 头部
  ctxE.strokeStyle = `rgba(100,220,200,${(0.5 + 0.3 * p) * (1 - fade)})`;
  ctxE.lineWidth = 2;
  ctxE.beginPath();
  ctxE.arc(barX, filledBottom, radius, 0, Math.PI * 2);
  ctxE.stroke();
}

// ─── 主动画循环 ───
function tick(time) {
  if (!lastTime) lastTime = time;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (globalPhase === 'complete') {
    completeT = Math.min(completeT + dt * 1.2, 1);
  }

  drawB(dt);
  drawC(dt);
  drawD(dt);
  drawE(dt);

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
