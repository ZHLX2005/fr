<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hold 视觉设计 — 波浪完成动画</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a14;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  h1 { font-size: 1.4em; color: #e0e0ff; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 40px; font-size: 0.85em; }

  .demo-area {
    display: flex;
    flex-direction: column;
    gap: 60px;
    align-items: center;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .stage-label {
    font-size: 0.75em;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  canvas {
    background: #0f0f1e;
    border-radius: 8px;
  }

  .controls {
    margin-top: 40px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: #3a3a6a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.9em;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #4a4a8a; }
  .btn.active { background: #5c5cff; }

  .desc {
    margin-top: 32px;
    max-width: 500px;
    text-align: center;
    color: #666;
    font-size: 0.8em;
    line-height: 1.6;
  }
</style>
</head>
<body>
<h1>Hold 音符 — 波浪完成动画</h1>
<p class="subtitle">填充进度 + 完成时底部波浪向上扩散</p>

<div class="demo-area">
  <div class="stage">
    <div class="stage-label">按住中（60% 进度）</div>
    <canvas id="holdCanvas" width="80" height="300"></canvas>
  </div>
</div>

<div class="controls">
  <button class="btn active" onclick="setPhase('idle')">待按下</button>
  <button class="btn" onclick="setPhase('holding')">按住中</button>
  <button class="btn" onclick="setPhase('complete')">完成动画</button>
</div>

<div class="desc">
  <strong>设计说明：</strong><br>
  按住时，条形从底部向上填充，填充区域实心，未填充区域半透明轮廓。<br>
  完成时，底部发出圆形波浪向上扩散，同时整体渐隐消失。
</div>

<script>
const canvas = document.getElementById('holdCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const barWidth = 28;
const barX = W / 2;
const judgeY = H * 0.75;

let phase = 'idle';
let animProgress = 0;
let lastTime = null;
let waveY = judgeY;
let waveAlpha = 0;

function setPhase(p) {
  phase = p;
  animProgress = 0;
  waveY = judgeY;
  waveAlpha = 0;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (!lastTime) requestAnimationFrame(tick);
}

function tick(time) {
  if (!lastTime) lastTime = time;
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  if (phase === 'complete') {
    animProgress = Math.min(animProgress + dt * 1.5, 1);
    waveY = judgeY - animProgress * (judgeY - 40);
    waveAlpha = Math.max(0, 0.8 * (1 - animProgress));
    if (animProgress < 1) {
      requestAnimationFrame(tick);
    } else {
      lastTime = null;
    }
  }

  draw();
  if (phase !== 'complete' || animProgress < 1) {
    requestAnimationFrame(tick);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 判定线
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, judgeY);
  ctx.lineTo(W, judgeY);
  ctx.stroke();

  const holdProgress = phase === 'idle' ? 0 : phase === 'holding' ? 0.6 : 0.6;
  const fadeProgress = phase === 'complete' ? animProgress : 0;
  const waveActive = phase === 'complete' && animProgress > 0;

  // 计算 tail 位置
  const travelPerMs = H * 0.75 / 2500;
  const holdDuration = 1000;
  const tailOffset = travelPerMs * holdDuration;
  const headY = judgeY + 20;
  const tailY = headY - tailOffset;

  // 底部渐变遮罩
  const barTop = tailY;
  const barBottom = headY;
  const fillHeight = (barBottom - barTop) * holdProgress;
  const fillBottom = barBottom;
  const fillTop = fillBottom - fillHeight;

  // 未填充区域（轮廓）
  ctx.strokeStyle = 'rgba(92,92,255,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(barX - barWidth/2, barTop);
  ctx.lineTo(barX - barWidth/2, barBottom);
  ctx.moveTo(barX + barWidth/2, barTop);
  ctx.lineTo(barX + barWidth/2, barBottom);
  ctx.stroke();

  // 填充区域（实心）
  if (holdProgress > 0) {
    const fillAlpha = fadeProgress > 0 ? 0.8 * (1 - fadeProgress) : 0.8;
    ctx.fillStyle = `rgba(92,92,255,${fillAlpha})`;
    ctx.fillRect(barX - barWidth/2, fillTop, barWidth, fillBottom - fillTop);
  }

  // 顶部前沿边缘高光
  if (holdProgress > 0 && holdProgress < 1) {
    const edgeAlpha = fadeProgress > 0 ? 0.9 * (1 - fadeProgress) : 0.9;
    ctx.fillStyle = `rgba(180,180,255,${edgeAlpha})`;
    ctx.fillRect(barX - barWidth/2, fillTop - 2, barWidth, 3);
  }

  // 头部圆圈
  const headAlpha = fadeProgress > 0 ? Math.max(0, 0.5 * (1 - fadeProgress)) : 0.5;
  ctx.strokeStyle = `rgba(92,92,255,${headAlpha})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(barX, headY, 10, 0, Math.PI * 2);
  ctx.stroke();

  // 波浪效果
  if (waveActive) {
    const waveRadius = animProgress * 50 + 10;
    ctx.strokeStyle = `rgba(180,180,255,${waveAlpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(barX, waveY, waveRadius, 0, Math.PI * 2);
    ctx.stroke();

    // 第二层波浪
    if (animProgress < 0.7) {
      const wave2Radius = animProgress * 35 + 5;
      ctx.strokeStyle = `rgba(140,140,255,${waveAlpha * 0.5})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(barX, waveY, wave2Radius, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// 初始绘制
draw();
requestAnimationFrame(tick);
</script>
</body>
</html>
