<h2>设置页面布局方案</h2>
<p class="subtitle">极简线条主义 + 主题色适配，左右分栏</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="min-height:320px;background:#fafafa;display:flex;align-items:center;justify-content:center;">
      <div style="width:90%;display:flex;gap:24px;padding:20px;">
        <!-- Left panel: controls -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;">
          <div style="font-size:11px;color:#999;letter-spacing:2px;text-transform:uppercase;">下落速度</div>
          <div style="font-size:32px;font-weight:100;color:#333;">2500<span style="font-size:14px;color:#bbb;">ms</span></div>
          <div style="width:2px;height:120px;position:relative;background:linear-gradient(to bottom, #3d5afe 0%, #e0e0e0 100%);border-radius:1px;">
            <div style="width:10px;height:10px;border-radius:50%;background:#3d5afe;position:absolute;left:-4px;top:50%;box-shadow:0 0 0 2px white, 0 0 0 3px #3d5afe;"></div>
          </div>
          <div style="display:flex;gap:40px;font-size:10px;color:#bbb;">
            <span>快</span><span>慢</span>
          </div>
        </div>
        <!-- Right panel: demo -->
        <div style="flex:1.2;display:flex;align-items:center;justify-content:center;">
          <div style="width:160px;height:260px;border:1px solid #ddd;border-radius:16px;position:relative;overflow:hidden;">
            <!-- Column lines -->
            <div style="position:absolute;left:33%;top:0;bottom:0;width:1px;background:#f0f0f0;"></div>
            <div style="position:absolute;left:66%;top:0;bottom:0;width:1px;background:#f0f0f0;"></div>
            <!-- Judge line -->
            <div style="position:absolute;left:0;right:0;top:75%;height:1px;background:rgba(61,90,254,0.2);"></div>
            <!-- Falling circle -->
            <div style="position:absolute;left:50%;top:40%;width:20px;height:20px;margin-left:-10px;margin-top:-10px;border:1.5px solid rgba(61,90,254,0.3);border-radius:50%;"></div>
            <!-- Explode particles -->
            <div style="position:absolute;left:66%;top:60%;">
              <div style="width:4px;height:4px;background:rgba(61,90,254,0.3);position:absolute;top:-6px;left:2px;"></div>
              <div style="width:4px;height:4px;background:rgba(61,90,254,0.2);position:absolute;top:3px;left:-8px;"></div>
              <div style="width:4px;height:4px;background:rgba(61,90,254,0.25);position:absolute;top:3px;left:12px;"></div>
            </div>
            <!-- Another circle falling -->
            <div style="position:absolute;left:16%;top:25%;width:20px;height:20px;margin-left:-10px;margin-top:-10px;border:1.5px solid rgba(61,90,254,0.3);border-radius:50%;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 竖向滑块</h3>
      <p>左侧用竖向滑块控制速度，视觉上与右侧演示高度对齐，整体更对称</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="min-height:320px;background:#fafafa;display:flex;align-items:center;justify-content:center;">
      <div style="width:90%;display:flex;gap:24px;padding:20px;">
        <!-- Left panel: controls -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;">
          <div style="font-size:11px;color:#999;letter-spacing:2px;text-transform:uppercase;">下落速度</div>
          <div style="width:80%;position:relative;">
            <div style="height:1.5px;background:linear-gradient(to right, #3d5afe 0%, #3d5afe 50%, #e0e0e0 50%, #e0e0e0 100%);"></div>
            <div style="width:8px;height:8px;border-radius:50%;background:#3d5afe;position:absolute;top:-3px;left:50%;transform:translateX(-50%);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;width:80%;font-size:10px;color:#bbb;">
            <span>快</span><span>慢</span>
          </div>
          <div style="font-size:28px;font-weight:100;color:#333;">2500<span style="font-size:14px;color:#bbb;">ms</span></div>
        </div>
        <!-- Right panel: demo (same as A) -->
        <div style="flex:1.2;display:flex;align-items:center;justify-content:center;">
          <div style="width:160px;height:260px;border:1px solid #ddd;border-radius:16px;position:relative;overflow:hidden;">
            <div style="position:absolute;left:33%;top:0;bottom:0;width:1px;background:#f0f0f0;"></div>
            <div style="position:absolute;left:66%;top:0;bottom:0;width:1px;background:#f0f0f0;"></div>
            <div style="position:absolute;left:0;right:0;top:75%;height:1px;background:rgba(61,90,254,0.2);"></div>
            <div style="position:absolute;left:50%;top:40%;width:20px;height:20px;margin-left:-10px;margin-top:-10px;border:1.5px solid rgba(61,90,254,0.3);border-radius:50%;"></div>
            <div style="position:absolute;left:16%;top:25%;width:20px;height:20px;margin-left:-10px;margin-top:-10px;border:1.5px solid rgba(61,90,254,0.3);border-radius:50%;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B — 横向滑块</h3>
      <p>左侧用横向滑块（与现有样式一致），布局更紧凑，上方数值+中间滑块+下方标签</p>
    </div>
  </div>
</div>
