<h2>Settings Page Layout</h2>
<p class="subtitle">Tab: 速度 | 背景样式 — placed above preview area</p>

<div class="mockup">
  <div class="mockup-header">Settings Page - 当前方案</div>
  <div class="mockup-body" style="background:#1a1a2e; color:#e0e0e0; font-family: system-ui; padding: 24px; min-height: 500px;">
    <!-- Back button -->
    <div style="position:absolute; top:12px; left:16px;">
      <span style="color:#7c8cf8; font-size:18px;">←</span>
    </div>

    <!-- Tabs: outside preview area -->
    <div style="display:flex; justify-content:center; gap:24px; margin-bottom:16px; padding-top:8px;">
      <span style="color:#7c8cf8; font-size:13px; font-weight:300; border-bottom:1px solid #7c8cf8; padding-bottom:4px;">速度</span>
      <span style="color:#666; font-size:13px; font-weight:200;">背景样式</span>
    </div>

    <!-- Preview area (60%) -->
    <div style="background:#7c8cf808; border:1px solid #7c8cf833; border-radius:12px; aspect-ratio:0.6; max-height:300px; margin:0 auto; position:relative; display:flex; align-items:center; justify-content:center;">
      <!-- Judge line -->
      <div style="position:absolute; top:75%; left:0; right:0; height:1px; background:#7c8cf840;"></div>
      <!-- Falling circle -->
      <div style="width:40px; height:40px; border:1.5px solid #7c8cf84d; border-radius:50%; position:absolute; top:35%; left:50%; transform:translateX(-50%);"></div>
      <!-- Speed label -->
      <div style="position:absolute; bottom:12px; text-align:center; color:#666; font-size:11px;">落体动画预览</div>
    </div>

    <!-- Speed controls (40%) -->
    <div style="margin-top:24px; text-align:center;">
      <div style="color:#888; font-size:11px; margin-bottom:8px;">下落速度</div>
      <div style="color:#7c8cf866; font-size:28px; font-weight:100; font-variant-numeric: tabular-nums;">2500ms</div>
      <div style="margin:12px 0;">
        <div style="height:1.5px; background:linear-gradient(to right, #7c8cf8, #333); border-radius:1px; position:relative;">
          <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:8px; height:8px; border-radius:50%; background:#7c8cf8;"></div>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; color:#888; font-size:11px;">
        <span>快</span><span>慢</span>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:32px;"></div>

<h2>Background Tab (背景样式)</h2>
<p class="subtitle">Three icon buttons: Grid | Lines | None</p>

<div class="mockup">
  <div class="mockup-header">Background Tab Selected</div>
  <div class="mockup-body" style="background:#1a1a2e; color:#e0e0e0; font-family: system-ui; padding: 24px; min-height: 500px;">
    <!-- Back button -->
    <div style="position:absolute; top:12px; left:16px;">
      <span style="color:#7c8cf8; font-size:18px;">←</span>
    </div>

    <!-- Tabs -->
    <div style="display:flex; justify-content:center; gap:24px; margin-bottom:16px; padding-top:8px;">
      <span style="color:#666; font-size:13px; font-weight:200;">速度</span>
      <span style="color:#7c8cf8; font-size:13px; font-weight:300; border-bottom:1px solid #7c8cf8; padding-bottom:4px;">背景样式</span>
    </div>

    <!-- Preview with grid background -->
    <div style="background:#7c8cf808; border:1px solid #7c8cf833; border-radius:12px; aspect-ratio:0.6; max-height:300px; margin:0 auto; position:relative; overflow:hidden;">
      <!-- Grid background -->
      <svg width="100%" height="100%" style="position:absolute;top:0;left:0;opacity:0.15;">
        <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#7c8cf8" stroke-width="0.5"/></pattern></defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>
      </svg>
      <!-- Judge line -->
      <div style="position:absolute; top:75%; left:0; right:0; height:1px; background:#7c8cf840;"></div>
      <div style="position:absolute; bottom:12px; text-align:center; color:#666; font-size:11px; width:100%;">背景效果预览</div>
    </div>

    <!-- Background style selector -->
    <div style="margin-top:24px; display:flex; justify-content:center; gap:16px;">
      <!-- Grid icon - selected -->
      <div style="width:56px; height:56px; border:1px solid #7c8cf8; border-radius:10px; display:flex; align-items:center; justify-content:center; background:#7c8cf812;">
        <svg width="28" height="28" viewBox="0 0 28 28"><path d="M0 9h28M0 19h28M9 0v28M19 0v28" fill="none" stroke="#7c8cf8" stroke-width="0.8"/></svg>
      </div>
      <!-- Lines icon -->
      <div style="width:56px; height:56px; border:1px solid #333; border-radius:10px; display:flex; align-items:center; justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 28 28"><line x1="9" y1="0" x2="9" y2="28" stroke="#666" stroke-width="0.8"/><line x1="14" y1="0" x2="14" y2="28" stroke="#666" stroke-width="0.8"/><line x1="19" y1="0" x2="19" y2="28" stroke="#666" stroke-width="0.8"/></svg>
      </div>
      <!-- None icon -->
      <div style="width:56px; height:56px; border:1px solid #333; border-radius:10px; display:flex; align-items:center; justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 28 28"><line x1="6" y1="6" x2="22" y2="22" stroke="#666" stroke-width="0.8"/><line x1="22" y1="6" x2="6" y2="22" stroke="#666" stroke-width="0.8"/></svg>
      </div>
    </div>
  </div>
</div>
